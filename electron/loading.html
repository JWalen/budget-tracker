<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; background: #0f172a; color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  .logo { width: 64px; height: 64px; border-radius: 14px; background: #0ea5e9;
          display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 40px; height: 40px; }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  p { font-size: 13px; margin: 0; color: #94a3b8; }
  .spinner { width: 22px; height: 22px; border: 3px solid #1e293b;
             border-top-color: #0ea5e9; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h14v4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 6v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="12" r="1" fill="white"/>
    </svg>
  </div>
  <h1>Budget Tracker</h1>
  <div class="spinner"></div>
  <p>Starting up…</p>
</body>
</html>
