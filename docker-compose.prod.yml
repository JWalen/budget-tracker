services:
  postgres:
    image: postgres:15-alpine
    container_name: budget-db-prod
    environment:
      # Fail-fast: Exit if required variables are not set
      POSTGRES_USER: ${DB_USER:?DB_USER environment variable is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME environment variable is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    # SECURITY: No ports exposed - database only accessible via internal network
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: budget-ollama-prod
    # SECURITY: No ports exposed externally
    networks:
      - internal
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODELS=${OLLAMA_MODELS:-/root/.ollama/models}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: budget-api-prod
    environment:
      # Required environment variables with fail-fast
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL environment variable is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET environment variable is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY environment variable is required}
      
      # Production settings
      NODE_ENV: production
      PORT: 5000
      HTTPS_ONLY: "true"
      
      # Frontend URL for CORS and email links
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL environment variable is required (e.g. https://budget.yourdomain.com)}
      
      # Ollama (internal network)
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      
      # Email configuration (optional)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@budgetapp.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Budget Tracker}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TO_FILE: "true"
      
      # Backup encryption (optional but recommended)
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # SECURITY: No volume mounts in production (no source code access)

  frontend:
    build: ./frontend
    container_name: budget-ui-prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BACKEND_URL=http://backend:5000
    volumes:
      # Mount SSL certificates if using direct nginx SSL
      # - ./ssl:/etc/nginx/ssl:ro
      # Use nginx-ssl.conf for SSL configuration
      # - ./frontend/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    # Isolate internal network from host
    internal: false  # Set to true for maximum isolation (will prevent external API calls from backend)

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
