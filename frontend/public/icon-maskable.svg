<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Full-bleed background: the OS/launcher applies its own mask/rounding for
       maskable icons, so this fills the whole square (no corner radius). -->
  <rect width="24" height="24" fill="#0ea5e9"/>

  <!-- Wallet centered within the ~50% safe zone (well inside the 80% maskable
       safe area) so it never gets clipped by an aggressive launcher mask. -->
  <g transform="translate(6, 6) scale(0.5)">
    <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h14v4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M4 6v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="16" cy="12" r="1" fill="white"/>
  </g>
</svg>
