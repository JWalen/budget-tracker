name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: budget_user
          POSTGRES_PASSWORD: budget_pass
          POSTGRES_DB: budget_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U budget_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Schema is provisioned by the test globalSetup (init.sql + schema.sql, the
      # converged production schema) — no manual psql seed, which previously only
      # loaded the stale init.sql and validated a schema production doesn't run.
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://budget_user:budget_pass@localhost:5432/budget_test
          TEST_DATABASE_URL: postgresql://budget_user:budget_pass@localhost:5432/budget_test
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          ENCRYPTION_KEY: test-encryption-key-for-ci
          NODE_ENV: test
        run: npm test -- --coverage --runInBand

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          directory: backend/coverage
          flags: backend
          fail_ci_if_error: false

      - name: Build backend
        working-directory: backend
        run: npm run build

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check TypeScript
        working-directory: backend
        run: npx tsc --noEmit

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (backend)
        working-directory: backend
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=moderate || true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, lint]
    # Only runs when an SSH deploy target is configured (repo variable
    # DEPLOY_ENABLED = 'true'). The app is distributed as a desktop installer, so
    # by default there is no server to deploy to and this job is skipped.
    if: vars.DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH || '~/docker/budget-tracker' }}
            # Use the production compose file for staging too — never the dev file,
            # which exposes the DB port and defaults to dev secrets / NODE_ENV=development.
            COMPOSE_FILE="docker-compose.prod.yml"
            [ -f "$COMPOSE_FILE" ] || COMPOSE_FILE="docker-compose.yml"
            echo "Pulling latest develop branch..."
            git pull origin develop
            echo "Rebuilding containers ($COMPOSE_FILE)..."
            docker compose -f "$COMPOSE_FILE" build --no-cache
            echo "Restarting services..."
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate
            echo "Waiting for health checks..."
            sleep 10
            docker compose -f "$COMPOSE_FILE" ps
            # Verify backend is healthy (prod compose names the container budget-api-prod)
            if ! docker exec budget-api-prod wget -qO- http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "ERROR: Backend health check failed after deploy!"
              docker compose -f "$COMPOSE_FILE" logs --tail=50 backend
              exit 1
            fi
            echo "Staging deploy complete!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, lint, security]
    # Only runs when an SSH deploy target is configured (repo variable
    # DEPLOY_ENABLED = 'true'). Skipped by default — the app ships as a desktop
    # installer, so there is no production server to deploy to.
    if: vars.DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Backup database before deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            BACKUP_DIR="${{ secrets.DEPLOY_PATH || '~/docker/budget-tracker' }}/backups"
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            OUT="$BACKUP_DIR/pre-deploy-${TIMESTAMP}.sql.gz"
            echo "Creating pre-deploy database backup..."
            # Read credentials from inside the container (the prod DB container is
            # budget-db-prod) rather than relying on undefined shell vars, and use
            # pipefail so a failed dump aborts instead of writing an empty .gz.
            docker exec budget-db-prod sh -c 'pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB"' | gzip > "$OUT"
            if [ "$(gzip -dc "$OUT" | head -c 1 | wc -c)" -eq 0 ]; then
              echo "Pre-deploy backup is empty — aborting deploy"; exit 1
            fi
            echo "Backup saved: $OUT"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '~/docker/budget-tracker' }}

            # Use production compose file
            COMPOSE_FILE="docker-compose.prod.yml"
            if [ ! -f "$COMPOSE_FILE" ]; then
              COMPOSE_FILE="docker-compose.yml"
            fi

            echo "Pulling latest main branch..."
            git pull origin main

            echo "Rebuilding containers..."
            docker compose -f "$COMPOSE_FILE" build --no-cache

            echo "Restarting services with zero-downtime..."
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate

            echo "Waiting for services to start..."
            sleep 15
            docker compose -f "$COMPOSE_FILE" ps

            # Verify backend is healthy
            CONTAINER_NAME="budget-api-prod"
            if ! docker ps --format '{{.Names}}' | grep -q "$CONTAINER_NAME"; then
              CONTAINER_NAME="budget-api"
            fi

            RETRIES=6
            for i in $(seq 1 $RETRIES); do
              if docker exec "$CONTAINER_NAME" wget -qO- http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              if [ "$i" -eq "$RETRIES" ]; then
                echo "ERROR: Backend health check failed after $RETRIES attempts!"
                docker compose -f "$COMPOSE_FILE" logs --tail=50 backend
                exit 1
              fi
              echo "Waiting for backend... ($i/$RETRIES)"
              sleep 5
            done

            # Clean up old Docker images
            docker image prune -f
            echo "Production deploy complete!"

      - name: Notify deploy success
        if: success()
        run: |
          echo "Production deploy successful!"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

      - name: Notify deploy failure
        if: failure()
        run: |
          echo "::error::Production deploy FAILED! Check server logs."
          echo "A pre-deploy database backup was created."

  release:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, lint, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/jwalen/budget-tracker-backend:latest
            ghcr.io/jwalen/budget-tracker-backend:${{ github.ref_name }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/jwalen/budget-tracker-frontend:latest
            ghcr.io/jwalen/budget-tracker-frontend:${{ github.ref_name }}

      # The GitHub Release itself (with the downloadable .dmg/.exe installers) is
      # created by the "Build Desktop Apps" workflow's release job — keeping a
      # single source of truth avoids two workflows racing on the same release.
