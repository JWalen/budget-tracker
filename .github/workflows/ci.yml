name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: budget_user
          POSTGRES_PASSWORD: budget_pass
          POSTGRES_DB: budget_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U budget_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Schema is provisioned by the test globalSetup (init.sql + schema.sql, the
      # converged production schema) — no manual psql seed, which previously only
      # loaded the stale init.sql and validated a schema production doesn't run.
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://budget_user:budget_pass@localhost:5432/budget_test
          TEST_DATABASE_URL: postgresql://budget_user:budget_pass@localhost:5432/budget_test
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          ENCRYPTION_KEY: test-encryption-key-for-ci
          NODE_ENV: test
        run: npm test -- --coverage --runInBand

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          directory: backend/coverage
          flags: backend
          fail_ci_if_error: false

      - name: Build backend
        working-directory: backend
        run: npm run build

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check TypeScript
        working-directory: backend
        run: npx tsc --noEmit

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (backend)
        working-directory: backend
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=moderate || true
