name: Build Desktop Apps

# Builds the desktop installers on NATIVE runners so each platform's native
# binaries (embedded PostgreSQL, sharp) resolve correctly — a Windows .exe is
# built on Windows, a macOS .dmg on macOS. Run manually or on a version tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: '*.dmg'
          - os: windows-latest
            platform: win
            artifact: '*.exe'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install each package's deps on the native runner so platform-specific
      # binaries (windows-x64 Postgres, win32/darwin sharp) are fetched correctly.
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install electron deps
        working-directory: electron
        run: npm ci

      - name: Build installer
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:${{ matrix.platform }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: budget-tracker-${{ matrix.platform }}
          path: electron/release/${{ matrix.artifact }}
          if-no-files-found: error

  # On a version tag, publish the built installers to a GitHub Release so users
  # can download the .dmg / .exe directly from the Releases page.
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/**/*.dmg
            installers/**/*.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
