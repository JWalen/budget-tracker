name: Build Desktop Apps

# Builds the desktop installers on NATIVE runners so each platform's native
# binaries (embedded PostgreSQL, sharp) resolve correctly — a Windows .exe is
# built on Windows, a macOS .dmg on macOS. Run manually or on a version tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: '*.dmg'
          - os: windows-latest
            platform: win
            artifact: '*.exe'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install each package's deps on the native runner so platform-specific
      # binaries (windows-x64 Postgres, win32/darwin sharp) are fetched correctly.
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install electron deps
        working-directory: electron
        run: npm ci

      # Code signing is automatic WHEN the matching secrets are configured;
      # otherwise the build is unsigned (users get an "unknown publisher" warning
      # they can click through). To enable it, add these repo secrets:
      #   macOS  — MAC_CSC_LINK (base64 of your Developer ID .p12),
      #            MAC_CSC_KEY_PASSWORD, and for notarization APPLE_ID,
      #            APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID.
      #   Windows — WIN_CSC_LINK (base64 of your code-signing .pfx),
      #            WIN_CSC_KEY_PASSWORD.
      # With no secrets set, every value below is empty and the build stays
      # unsigned — exactly as before.
      - name: Build installer
        working-directory: electron
        env:
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_LINK || secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Only let electron-builder look for a signing identity when a cert was
          # actually supplied — otherwise force unsigned so the build can't fail
          # on a missing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ (matrix.platform == 'mac' && secrets.MAC_CSC_LINK != '') && 'true' || 'false' }}
        run: npm run dist:${{ matrix.platform }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: budget-tracker-${{ matrix.platform }}
          path: electron/release/${{ matrix.artifact }}
          if-no-files-found: error

  # On a version tag, publish the built installers to a GitHub Release so users
  # can download the .dmg / .exe directly from the Releases page.
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/**/*.dmg
            installers/**/*.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
